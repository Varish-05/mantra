# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, aligned with app structure
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone = UTC

# max length of characters to truncate the migration slug
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autocommit
# revision_environment = false

# set to 'true' to allow empty migrations to be created
# and run
# allow_empty_history = false

# version locations.  defaults to alembic/versions.
# version_locations = %(here)s/bar:%(here)s/bat

# the docstring prefix for new revision files.
# Choose 'python' or 'markdown'
# revision_docstring_prefix = python

sqlalchemy.url = postgresql://postgres:postgres_secure_password_1337@localhost:5432/mantra

[post_write_hooks]
# post_write_hooks defines scripts that are run after a new migration script is generated.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
